name: Google Cloud Monitoring
description: >-
  Google Cloud Monitoring provides comprehensive monitoring and observability
  for cloud infrastructure and applications. It collects metrics, events, and
  metadata from Google Cloud services, hosted uptime probes, and application
  instrumentation, enabling dashboards, alerting, uptime monitoring, and
  service level objective tracking.
