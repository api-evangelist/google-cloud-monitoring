apis:
  - name: Google Cloud Monitoring API
    description: >-
      The Cloud Monitoring API provides programmatic access to time series data,
      alert policies, notification channels, uptime checks, dashboards, metric
      descriptors, monitored resource descriptors, and service level objectives
      for comprehensive infrastructure and application monitoring.
    humanURL: https://cloud.google.com/monitoring/docs
    baseURL: https://monitoring.googleapis.com
